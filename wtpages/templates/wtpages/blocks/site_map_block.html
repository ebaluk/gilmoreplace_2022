{% load wagtailcore_tags wagtailimages_tags wtpages_tags %}



<article class="text-block themed-{{self.theme.id}} {{self.theme.css_class}} page-layout-whole">    
    <div class="container page-text-wrapper">        
        <div class="row">

            <div class="txt col-xs-12">
                <div>

                    {% if self.title %}
                    <div class="page-header insidetext text-center">
                        <div class="title-wrapper">
                            <h2 class="title">{{ self.title }}</h2>
                        </div>
                    </div>
                    {% endif %}

                    <div class="body-text {% if self.text_align %} text-{{self.text_align}}{% endif %}">
                        {% site_map %}
                    </div>

                </div>
            </div>

        </div>

    </div>
</article>
