{% load wagtailcore_tags  %}  

{% if request.root_page.neighbourhood.all %}
    <div class="neighbourhood-widget" 
        data-latitude="{{request.root_page.latitude}}" data-longitude="{{request.root_page.longitude}}"
        data-zoom="15"
        
    >
        <div class="neighbourhood-map">

        </div>
        <div class="neighbourhood-nav">
            <div class="panel-group" id="places" role="tablist" aria-multiselectable="true">
                {% for item in request.root_page.neighbourhood.all %}
                <div class="panel panel-primary neighbourhood-category">
                    <a class="panel-heading btn btn-block text-uppercase text-left" role="tab" id="neighbourhood-group-{{item.id}}" data-toggle="collapse" data-parent="#places" href="#neighbourhood-group-collapse-{{item.id}}" aria-expanded="false" aria-controls="neighbourhood-group-collapse-{{item.id}}">
                        {{item.title}}                            
                    </a>
                    <div id="neighbourhood-group-collapse-{{item.id}}" class="panel-collapse collapse neighbourhood-place" role="tabpanel" aria-labelledby="neighbourhood-group-{{item.id}}">
                        <div class="-list-group">
                        {% include_block item.places %}       
                        </div>
                    </div>
                    </div>
                {% endfor %}
            </div>                                
        </div>
    </div>
{% endif %}
