name: Deploy DEV

on:
  workflow_dispatch:
    inputs:
      tags:
        description: Ansible tags (dev = full sync + compose)
        required: true
        default: dev
        type: choice
        options:
          - dev
          - sync
          - compose
          - bootstrap
  push:
    branches: [main, master]

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: Ansible → DEV
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: ansible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.16,<2.18"

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Configure SSH key
        env:
          DEV_SSH_PRIVATE_KEY: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${DEV_SSH_PRIVATE_KEY:-}" ]; then
            echo "Missing secret DEV_SSH_PRIVATE_KEY" >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEV_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 155.212.224.19 >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy with Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "True"
        run: |
          TAGS="${{ github.event.inputs.tags || 'dev' }}"
          ansible-playbook deploy.yml \
            -e "filevar=dev" \
            -e "ansible_ssh_private_key_file=$HOME/.ssh/deploy_key" \
            --tags="$TAGS"
