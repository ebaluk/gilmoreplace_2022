name: CI / CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      tags:
        description: Ansible tags (dev = full sync + compose)
        required: true
        default: dev
        type: choice
        options:
          - dev
          - sync
          - compose
          - bootstrap

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gilmoreplace_2022
          POSTGRES_USER: django
          POSTGRES_PASSWORD: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U django -d gilmoreplace_2022"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DJANGO_SETTINGS_MODULE: gilmoreplace_2022.settings.dev
      DISABLE_LOCAL_SETTINGS: "1"
      SECRET_KEY: ci-secret-key-not-for-production
      DB_NAME: gilmoreplace_2022
      DB_USER: django
      DB_PASSWORD: ci
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      REVALIDATION_SECRET: ci-revalidation
      PREVIEW_SECRET: ci-preview
      NEXTJS_PUBLIC_URL: http://localhost:3000
      NEXTJS_BASE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.26"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Run migrations
        run: uv run python manage.py migrate --noinput

      - name: Run API tests
        run: uv run python manage.py test gilmoreplace_2022.api.tests --verbosity=1

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gilmoreplace-next

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gilmoreplace-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          WAGTAIL_API_URL: http://localhost:8000/api/v2
          REVALIDATION_SECRET: ci-revalidation
          PREVIEW_SECRET: ci-preview

  deploy:
    name: Deploy DEV (Ansible)
    needs: [backend, frontend]
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: ansible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rsync
        working-directory: .
        run: sudo apt-get update -qq && sudo apt-get install -y rsync

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        working-directory: .
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.16,<2.18"

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Configure SSH key
        working-directory: .
        env:
          DEV_SSH_PRIVATE_KEY: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${DEV_SSH_PRIVATE_KEY:-}" ]; then
            echo "Missing secret DEV_SSH_PRIVATE_KEY" >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEV_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 155.212.224.19 >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: SSH smoke-test
        working-directory: .
        run: |
          set -euo pipefail
          ssh -i "$HOME/.ssh/deploy_key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=yes \
            appuser@155.212.224.19 'echo ok'

      - name: Deploy with Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "True"
        run: |
          set -euo pipefail
          export ANSIBLE_PRIVATE_KEY_FILE="${HOME}/.ssh/deploy_key"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAGS="${{ inputs.tags }}"
          else
            TAGS="dev"
          fi
          ansible-playbook deploy.yml \
            -e "filevar=dev" \
            -e "ansible_user=appuser" \
            -e "ansible_ssh_private_key_file=${ANSIBLE_PRIVATE_KEY_FILE}" \
            --tags="$TAGS"
