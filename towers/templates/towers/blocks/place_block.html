{% load wagtailcore_tags  %}  
<button class="list-group-item btn btn-block text-uppercase" data-title="{{self.title}}" data-latitude="{{self.latitude}}" data-longitude="{{self.longitude}}" 
    {% if self.url %} data-url="{{self.url}}" {% endif %}
    {% if self.address %} data-address="{{self.address}}" {% endif %}
>{{self.title}}</button>
