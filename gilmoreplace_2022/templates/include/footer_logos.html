{% load  wagtailcore_tags wagtailimages_tags  wtpages_tags %}

<div class="footer-logos">	
	{% for item in items %}
		<{% if item.link %}a href="{{item.link}}" target="_blank"{% else %}div{% endif %}>
			{% image item.image max-500x95 as carouselimagedata %}
			<img data-lazyload="false" src="{{ carouselimagedata.url }}" alt="{{item.title}}">
	    </{% if item.link %}a{% else %}div{% endif %}>
	{% endfor %}
</div>
