# Server deploy (DEV/prod VM behind host nginx-proxy for SSL)
# Env: prod_server.env (see prod_server.env.example)

services:
  postgres:
    image: postgres:16-alpine
    container_name: gilmoreplace-postgres
    restart: unless-stopped
    env_file:
      - ./prod_server.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/db/initdb.d:/docker-entrypoint-initdb.d:ro
      - ./deploy/db:/deploy-db:ro
    networks:
      - gilmoreplace

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gilmoreplace-backend
    restart: unless-stopped
    env_file:
      - ./prod_server.env
    environment:
      - DJANGO_SETTINGS_MODULE=gilmoreplace_2022.settings.production
      - DB_HOST=${DB_HOST:-postgres}
    depends_on:
      - postgres
    volumes:
      - ./media_files:/app/media_files
      - ./static:/app/static
    networks:
      - gilmoreplace

  frontend:
    build:
      context: ./gilmoreplace-next
      dockerfile: Dockerfile
      args:
        WAGTAIL_API_URL: http://backend:8000/api/v2
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://gilmoreplace.ebaluk.store}
    container_name: gilmoreplace-frontend
    restart: unless-stopped
    env_file:
      - ./prod_server.env
    environment:
      - WAGTAIL_API_URL=http://backend:8000/api/v2
    networks:
      - gilmoreplace

  nginx:
    image: nginx:alpine
    container_name: gilmoreplace-nginx
    restart: unless-stopped
    env_file:
      - ./prod_server.env
    environment:
      VIRTUAL_HOST: ${VIRTUAL_HOST}
      VIRTUAL_PORT: "80"
      LETSENCRYPT_HOST: ${LETSENCRYPT_HOST:-${VIRTUAL_HOST}}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    expose:
      - "80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro
      - ./media_files:/app/media_files:ro
    depends_on:
      - backend
      - frontend
    networks:
      - gilmoreplace
      - nginx-proxy-network

networks:
  gilmoreplace:
    driver: bridge
  nginx-proxy-network:
    external: true
    name: nginx-proxy-network

volumes:
  postgres_data:
